services:
  postgres:
    image: postgres:16-alpine
    container_name: ppob-postgres
    restart: always
    environment:
      POSTGRES_USER: ${PGUSER:-ppob}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD wajib diisi di .env}
      POSTGRES_DB: ${PGDATABASE:-ppob}
    # Hanya dengar di localhost VPS -> tidak terbuka ke internet (aman).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ppob_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-ppob} -d ${PGDATABASE:-ppob}"]
      interval: 10s
      timeout: 5s
      retries: 5

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: always
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    # Diikat ke localhost: hanya bisa diakses bot dari dalam VPS (tidak ke internet).
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ppob_pgdata:
    name: ppob_pgdata
  telegram-bot-api-data:
    name: telegram-bot-api-data
