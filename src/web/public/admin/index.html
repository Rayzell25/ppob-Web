<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Rayzell Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary:      #0a0f1e;
      --bg-secondary:    #0d1426;
      --glass-bg:        rgba(255, 255, 255, 0.04);
      --glass-border:    rgba(255, 255, 255, 0.08);
      --glass-hover:     rgba(255, 255, 255, 0.07);
      --text-primary:    #f0f4ff;
      --text-secondary:  #8892b0;
      --text-muted:      #4a5568;
      --accent-indigo:   #6366f1;
      --accent-purple:   #8b5cf6;
      --accent-violet:   #7c3aed;
      --gradient-main:   linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --gradient-glow:   linear-gradient(135deg, rgba(99,102,241,0.3) 0%, rgba(139,92,246,0.3) 100%);
      --error-bg:        rgba(239, 68, 68, 0.12);
      --error-border:    rgba(239, 68, 68, 0.35);
      --error-text:      #fca5a5;
      --input-bg:        rgba(255, 255, 255, 0.05);
      --input-border:    rgba(255, 255, 255, 0.10);
      --input-focus:     rgba(99, 102, 241, 0.5);
      --shadow-card:     0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.05);
      --radius-card:     24px;
      --radius-input:    12px;
      --radius-btn:      12px;
      --transition:      0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-canvas::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      top: -200px;
      left: -150px;
      animation: pulse-orb 8s ease-in-out infinite alternate;
    }

    .bg-canvas::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
      bottom: -180px;
      right: -100px;
      animation: pulse-orb 10s ease-in-out infinite alternate-reverse;
    }

    .bg-orb-mid {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-orb 12s ease-in-out infinite alternate;
    }

    /* Grid overlay */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    @keyframes pulse-orb {
      0%   { transform: scale(1) translate(0, 0); opacity: 0.8; }
      100% { transform: scale(1.15) translate(20px, -20px); opacity: 1; }
    }

    /* ── LAYOUT ── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── CARD ── */
    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      padding: 48px 40px 40px;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);

      /* Fade-in animation */
      animation: card-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(32px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo-ring {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--gradient-main);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.4),
        0 8px 32px rgba(99,102,241,0.4),
        0 0 60px rgba(139,92,246,0.25);
      position: relative;
      animation: logo-glow 3s ease-in-out infinite alternate;
    }

    @keyframes logo-glow {
      0%  { box-shadow: 0 0 0 1px rgba(99,102,241,0.4), 0 8px 32px rgba(99,102,241,0.4), 0 0 60px rgba(139,92,246,0.25); }
      100%{ box-shadow: 0 0 0 1px rgba(139,92,246,0.6), 0 8px 48px rgba(139,92,246,0.6), 0 0 80px rgba(168,85,247,0.4); }
    }

    .logo-ring svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 2px 8px rgba(255,255,255,0.3));
    }

    /* ── HEADER TEXT ── */
    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-header h1 span {
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-header p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* ── FORM ── */
    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color var(--transition);
      display: flex;
      align-items: center;
    }

    .input-wrap .input-icon svg {
      width: 18px;
      height: 18px;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-input);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      outline: none;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      letter-spacing: 0.01em;
    }

    .input-wrap input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    .input-wrap input:focus {
      border-color: var(--accent-indigo);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px var(--input-focus), 0 4px 16px rgba(99,102,241,0.15);
    }

    .input-wrap:focus-within .input-icon {
      color: var(--accent-indigo);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color var(--transition);
    }

    .pw-toggle:hover {
      color: var(--text-secondary);
    }

    .pw-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* password input needs right padding for toggle btn */
    #password {
      padding-right: 44px;
    }

    /* ── ERROR BOX ── */
    .error-box {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 10px;
      animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    .error-box.visible {
      display: flex;
    }

    .error-box svg {
      width: 18px;
      height: 18px;
      color: var(--error-text);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .error-box span {
      font-size: 0.875rem;
      color: var(--error-text);
      line-height: 1.45;
      font-weight: 500;
    }

    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(3px); }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60% { transform: translateX(4px); }
    }

    /* ── LOGIN BUTTON ── */
    .btn-login {
      position: relative;
      margin-top: 6px;
      width: 100%;
      padding: 15px 24px;
      border: none;
      border-radius: var(--radius-btn);
      background: var(--gradient-main);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      overflow: hidden;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 24px rgba(99,102,241,0.4), 0 1px 0 rgba(255,255,255,0.1) inset;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.55), 0 1px 0 rgba(255,255,255,0.1) inset;
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login .btn-text   { display: inline-flex; align-items: center; gap: 8px; }
    .btn-login .btn-loader { display: none; align-items: center; gap: 8px; }
    .btn-login.loading .btn-text   { display: none; }
    .btn-login.loading .btn-loader { display: inline-flex; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── LOCKOUT NOTICE ── */
    .lockout-notice {
      display: none;
      text-align: center;
      font-size: 0.82rem;
      color: var(--error-text);
      font-weight: 500;
      margin-top: -4px;
    }

    .lockout-notice.visible {
      display: block;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--glass-border);
      margin: 24px 0 20px;
    }

    /* ── BOTTOM BADGE ── */
    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .secure-badge svg {
      width: 13px;
      height: 13px;
      color: #4ade80;
    }

    /* ── FOOTER ── */
    .card-footer {
      margin-top: 16px;
      text-align: center;
    }

    .card-footer p {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .card-footer p strong {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px 32px;
      }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb-mid"></div>
  </div>

  <!-- Page wrapper -->
  <div class="page-wrapper">
    <div class="login-card" role="main">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-ring" aria-hidden="true">
          <!-- Lightning bolt icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"
                  fill="white"
                  stroke="rgba(255,255,255,0.5)"
                  stroke-width="0.5"
                  stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Header -->
      <div class="card-header">
        <h1>Rayzell Store <span>Admin</span></h1>
        <p>Masuk ke panel manajemen PPOB</p>
      </div>

      <!-- Error box -->
      <div class="error-box" id="errorBox" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorMsg">Email atau password salah.</span>
      </div>

      <!-- Login form -->
      <form id="loginForm" novalidate autocomplete="off">

        <!-- Email field -->
        <div class="field-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <div class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="admin@rayzellstore.com"
              autocomplete="username email"
              inputmode="email"
              required
              spellcheck="false"
            />
          </div>
        </div>

        <!-- Password field -->
        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <div class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility" tabindex="-1">
              <svg id="eyeShow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeHide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Lockout notice -->
        <div class="lockout-notice" id="lockoutNotice">
          Terlalu banyak percobaan. Tunggu <span id="lockoutTimer">30</span> detik.
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Masuk ke Dashboard
          </span>
          <span class="btn-loader">
            <div class="spinner"></div>
            Memverifikasi...
          </span>
        </button>

      </form>

      <div class="divider"></div>

      <div class="secure-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Koneksi aman &amp; terenkripsi
      </div>

      <div class="card-footer">
        <p><strong>Rayzell Store</strong> &copy; 2026 &mdash; Admin Panel</p>
      </div>

    </div>
  </div>

  <script>
    (() => {
      'use strict';

      /* ── CONSTANTS ── */
      const TOKEN_KEY      = 'admin_token';
      const DASHBOARD_URL  = '/admin/dashboard.html';
      const LOGIN_ENDPOINT = '/api/admin/login';
      const MAX_FAILURES   = 5;
      const LOCKOUT_SECS   = 30;

      /* ── DOM refs ── */
      const form          = document.getElementById('loginForm');
      const emailInput    = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginBtn      = document.getElementById('loginBtn');
      const errorBox      = document.getElementById('errorBox');
      const errorMsg      = document.getElementById('errorMsg');
      const lockoutNotice = document.getElementById('lockoutNotice');
      const lockoutTimer  = document.getElementById('lockoutTimer');
      const pwToggle      = document.getElementById('pwToggle');
      const eyeShow       = document.getElementById('eyeShow');
      const eyeHide       = document.getElementById('eyeHide');

      /* ── STATE ── */
      let failureCount     = 0;
      let lockedOut        = false;
      let lockoutCountdown = null;

      /* ── AUTO-REDIRECT if already authenticated ── */
      (function checkExistingSession() {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) return;
        try {
          const parts = token.split('.');
          if (parts.length !== 3) throw new Error('Not JWT');
          const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
          const now = Math.floor(Date.now() / 1000);
          if (payload.exp && payload.exp < now) {
            localStorage.removeItem(TOKEN_KEY);
            return;
          }
          window.location.replace(DASHBOARD_URL);
        } catch (_) {
          /* Treat any stored token as valid and redirect — server will handle auth */
          window.location.replace(DASHBOARD_URL);
        }
      })();

      /* ── PASSWORD TOGGLE ── */
      pwToggle.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeShow.style.display = isPassword ? 'none' : '';
        eyeHide.style.display = isPassword ? ''     : 'none';
        passwordInput.focus();
      });

      /* ── HELPERS ── */
      function showError(msg) {
        errorMsg.textContent = msg;
        errorBox.classList.add('visible');
        /* Re-trigger shake */
        errorBox.style.animation = 'none';
        void errorBox.offsetWidth;
        errorBox.style.animation = '';
      }

      function hideError() {
        errorBox.classList.remove('visible');
      }

      function setLoading(state) {
        loginBtn.disabled = state || lockedOut;
        loginBtn.classList.toggle('loading', state);
      }

      function startLockout() {
        lockedOut = true;
        loginBtn.disabled = true;
        lockoutNotice.classList.add('visible');

        let remaining = LOCKOUT_SECS;
        lockoutTimer.textContent = remaining;

        lockoutCountdown = setInterval(() => {
          remaining--;
          lockoutTimer.textContent = remaining;
          if (remaining <= 0) {
            clearInterval(lockoutCountdown);
            lockedOut        = false;
            failureCount     = 0;
            loginBtn.disabled = false;
            lockoutNotice.classList.remove('visible');
            hideError();
          }
        }, 1000);
      }

      /* ── FORM SUBMIT ── */
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (lockedOut) return;

        const email    = emailInput.value.trim();
        const password = passwordInput.value;

        /* Client-side validation */
        if (!email) {
          showError('Email tidak boleh kosong.');
          emailInput.focus();
          return;
        }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          showError('Format email tidak valid.');
          emailInput.focus();
          return;
        }
        if (!password) {
          showError('Password tidak boleh kosong.');
          passwordInput.focus();
          return;
        }

        hideError();
        setLoading(true);

        try {
          const response = await fetch(LOGIN_ENDPOINT, {
            method:  'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept':       'application/json',
            },
            body: JSON.stringify({ email, password }),
          });

          let data;
          try { data = await response.json(); }
          catch (_) { data = {}; }

          if (response.ok && data.ok && data.token) {
            /* SUCCESS */
            localStorage.setItem(TOKEN_KEY, data.token);

            /* Green success state before redirect */
            loginBtn.classList.remove('loading');
            loginBtn.innerHTML = `
              <span class="btn-text" style="justify-content:center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                Berhasil! Mengalihkan…
              </span>`;
            loginBtn.style.background  = 'linear-gradient(135deg, #10b981, #059669)';
            loginBtn.style.boxShadow   = '0 4px 24px rgba(16,185,129,0.45)';

            setTimeout(() => window.location.replace(DASHBOARD_URL), 700);

          } else {
            /* FAILURE */
            failureCount++;
            const serverMsg = data.message || data.error || null;

            if (failureCount >= MAX_FAILURES) {
              showError('Terlalu banyak percobaan gagal. Akses dikunci sementara.');
              startLockout();
            } else {
              const left = MAX_FAILURES - failureCount;
              showError(
                serverMsg
                  ? `${serverMsg} (${left} percobaan tersisa)`
                  : `Email atau password salah. (${left} percobaan tersisa)`
              );
            }

            passwordInput.value = '';
            passwordInput.focus();
            setLoading(false);
          }

        } catch (err) {
          showError('Tidak dapat terhubung ke server. Periksa koneksi Anda.');
          console.error('[Login] Fetch error:', err);
          setLoading(false);
        }
      });

      /* Clear error on any input change */
      [emailInput, passwordInput].forEach(el => {
        el.addEventListener('input', hideError);
      });

    })();
  </script>
</body>
</html>
